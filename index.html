<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام حضور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0f2027;--bg2:#203a43;--bg3:#2c5364;
  --gold:#d4af37;--card:#ffffff;
  --success:#2ecc71;--danger:#e74c3c
}
*{box-sizing:border-box}
body{
  margin:0;font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:#fff;min-height:100vh
}
header{text-align:center;padding:22px;font-size:26px;font-weight:800;color:var(--gold)}
.container{max-width:1100px;margin:auto;padding:20px}
.card{
  background:var(--card);color:#222;border-radius:22px;
  padding:25px;margin-bottom:20px;
  box-shadow:0 20px 45px rgba(0,0,0,.35)
}
.center-screen{
  position:fixed;inset:0;display:flex;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  z-index:100
}
.center-box{width:100%;max-width:520px;animation:fade .4s}
@keyframes fade{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
button,input{
  font-family:'Cairo',sans-serif;padding:12px;
  border-radius:12px;border:1px solid #ccc;font-size:15px
}
button{cursor:pointer;font-weight:700}
.gold{background:var(--gold);border:none;color:#000}
.red{background:var(--danger);border:none;color:#fff}
.hidden{display:none !important}
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#000;padding:14px 30px;
  border-radius:30px;font-weight:800;opacity:0;
  transition:opacity 1s;z-index:200
}
.toast.show{opacity:1}
.student-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px;border-bottom:1px solid #eee
}
.present{color:var(--success);font-weight:800}
.absent{color:var(--danger);font-weight:800}
.center-input{display:flex;justify-content:center}
.center-input input{width:100%;max-width:420px;text-align:center;font-size:18px}
</style>
</head>
<body>
<header>📘 حضور الطلبة</header>
<div id="toast" class="toast"></div>

<!-- تسجيل الدخول -->
<div id="loginPage" class="center-screen">
  <div class="center-box">
    <div class="card">
      <h3 style="text-align:center">تسجيل الدخول</h3>
      <input id="loginUser" placeholder="اسم المستخدم"><br><br>
      <input id="loginPass" type="password" placeholder="كلمة السر"><br><br>
      <button type="button" class="gold" onclick="login()">دخول</button>
      <button type="button" onclick="openCreateUser()">إنشاء مستخدم</button>
    </div>
  </div>
</div>

<!-- إنشاء مستخدم -->
<div id="createUserPage" class="center-screen hidden">
  <div class="center-box">
    <div class="card">
      <h3 style="text-align:center">إنشاء مستخدم</h3>
      <input id="newUser" placeholder="اسم المستخدم"><br><br>
      <input id="newPass" type="password" placeholder="كلمة السر"><br><br>
      <button type="button" class="gold" onclick="createUser()">حفظ</button>
      <button type="button" onclick="closeCreateUser()">رجوع</button>
    </div>
  </div>
</div>

<!-- الواجهة الرئيسية -->
<div class="container hidden" id="main">
  <div class="card" style="text-align:center">
    <button class="gold" onclick="openAdd()">➕ إضافة طالب</button>
    <button onclick="openReport()">📋 التقرير</button>
    <button onclick="newDay()">🔄 بداية جديدة</button><br><br>
    <button class="red" onclick="wipeData()">🧹 مسح البيانات</button>
    <button class="red" onclick="deleteUser()">❌ مسح المستخدم</button>
  </div>

  <div class="card">
    <h3 style="text-align:center">تسجيل الحضور بالباركود</h3>
    <div class="center-input">
      <input id="scan" placeholder="امسح الباركود ليُسجَّل حاضر تلقائياً" oninput="autoPresent()">
    </div>
  </div>
</div>

<!-- إضافة طالب -->
<div id="addPage" class="center-screen hidden">
  <div class="center-box">
    <div class="card">
      <h3 style="text-align:center">إضافة طالب</h3>
      <input id="newName" placeholder="اسم الطالب"><br><br>
      <input id="newBarcode" placeholder="باركود الطالب" onkeypress="if(event.key==='Enter')addStudent()"><br><br>
      <button class="gold" onclick="addStudent()">حفظ</button>
      <button onclick="closeAdd()">رجوع</button>
    </div>
  </div>
</div>

<!-- التقرير -->
<div id="reportPage" class="center-screen hidden">
  <div class="center-box">
    <div class="card">
      <h3 style="text-align:center">تقرير الحضور</h3>
      <div id="reportList"></div><br>
      <button class="gold" onclick="saveReportImage()">💾 حفظ التقرير</button>
      <button onclick="closeReport()">رجوع</button>
    </div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')||'{}');
let currentUser = localStorage.getItem('currentUser');

function saveUsers(){localStorage.setItem('users',JSON.stringify(users));}
function toastMsg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1000)}

function login(){
  const u=loginUser.value.trim(), p=loginPass.value.trim();
  if(users[u] && users[u].pass===p){
    currentUser=u; localStorage.setItem('currentUser',u);
    loginPage.classList.add('hidden');
    createUserPage.classList.add('hidden');
    main.classList.remove('hidden');
  } else alert('بيانات الدخول غير صحيحة');
}

function openCreateUser(){loginPage.classList.add('hidden');createUserPage.classList.remove('hidden')}
function closeCreateUser(){createUserPage.classList.add('hidden');loginPage.classList.remove('hidden')}

function createUser(){
  const u=newUser.value.trim(), p=newPass.value.trim();
  if(!u||!p) return alert('أكمل البيانات');
  if(users[u]) return alert('المستخدم موجود');
  users[u]={pass:p, students:[]}; saveUsers();
  newUser.value=''; newPass.value=''; toastMsg('تم إنشاء المستخدم');
  closeCreateUser();
}

function getStudents(){return users[currentUser].students}
function saveStudents(a){users[currentUser].students=a; saveUsers()}

function openAdd(){main.classList.add('hidden');addPage.classList.remove('hidden')}
function closeAdd(){addPage.classList.add('hidden');main.classList.remove('hidden')}
function addStudent(){
  const n=newName.value.trim(), b=newBarcode.value.trim();
  if(!n||!b) return;
  const a=getStudents(); a.push({name:n,barcode:b,status:'غائب'});
  saveStudents(a); newName.value=''; newBarcode.value='';
  toastMsg('تمت إضافة الطالب'); closeAdd();
}

function autoPresent(){
  const v=scan.value.trim(); if(!v) return;
  const a=getStudents(); const s=a.find(x=>x.barcode===v);
  if(s){s.status='حاضر'; saveStudents(a); scan.value='';}
}

function openReport(){renderReport();main.classList.add('hidden');reportPage.classList.remove('hidden')}
function closeReport(){reportPage.classList.add('hidden');main.classList.remove('hidden')}
function renderReport(){
  const a=getStudents(); reportList.innerHTML='';
  a.forEach((s,i)=>{
    reportList.innerHTML+=`
    <div class="student-row">
      <span>${s.name}</span>
      <span class="${s.status==='حاضر'?'present':'absent'}">${s.status}</span>
      <button class="red" onclick="deleteStudent(${i})">حذف</button>
    </div>`;
  });
}
function deleteStudent(i){const a=getStudents(); a.splice(i,1); saveStudents(a); renderReport()}

function newDay(){const a=getStudents(); a.forEach(s=>s.status='غائب'); saveStudents(a); toastMsg('بدأ يوم دوام جديد')}
function wipeData(){const p=prompt('أدخل كلمة السر'); if(p===users[currentUser].pass){newDay()} else alert('كلمة السر غير صحيحة')}
function deleteUser(){const p=prompt('أدخل كلمة السر'); if(p===users[currentUser].pass){delete users[currentUser]; saveUsers(); localStorage.removeItem('currentUser'); location.reload()} else alert('كلمة السر غير صحيحة')}

function saveReportImage(){window.print()}

if(currentUser && users[currentUser]){loginPage.classList.add('hidden'); main.classList.remove('hidden');}
</script>
</body>
</html>
