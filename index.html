<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>نظام طلبات المطعم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --amber:#f59e0b; --amber-light:#d97706; --amber-dark:#b45309;
  --bg:#f5f4f0; --surface:#fff; --surface2:#f9f7f4; --surface3:#f0ede7;
  --border:rgba(0,0,0,0.08); --border2:rgba(217,119,6,0.3);
  --text:#1c1917; --muted:#78716c; --green:#059669; --red:#dc2626;
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(245,158,11,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(251,191,36,.05) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* ── HEADER ── */
header{background:rgba(255,255,255,.96);border-bottom:1px solid var(--border);padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px);}
.hbrand{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.hicon{width:38px;height:38px;background:linear-gradient(135deg,var(--amber-dark),var(--amber));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;box-shadow:0 4px 12px rgba(245,158,11,.3);}
#rname-disp{font-size:18px;font-weight:900;cursor:pointer;color:var(--amber-dark);border-bottom:2px dashed rgba(217,119,6,.35);padding-bottom:1px;transition:opacity .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
#rname-disp:hover{opacity:.75;}
#name-wrap{display:none;align-items:center;gap:7px;}
#name-inp{background:var(--surface3);border:2px solid var(--amber);border-radius:9px;padding:5px 12px;color:var(--text);font-size:14px;font-family:'Tajawal',sans-serif;font-weight:700;outline:none;width:160px;}
.btn-sname{background:linear-gradient(135deg,var(--amber-dark),var(--amber));color:#fff;border:none;border-radius:9px;padding:5px 12px;cursor:pointer;font-weight:800;font-family:'Tajawal',sans-serif;font-size:13px;}
.hactions{display:flex;align-items:center;gap:9px;flex-shrink:0;}
#tbl-inp{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:7px 12px;color:var(--text);font-size:13px;font-family:'Tajawal',sans-serif;outline:none;width:110px;text-align:right;transition:border-color .2s;}
#tbl-inp:focus{border-color:var(--border2);}
#tbl-inp::placeholder{color:var(--muted);}
.btn-mgr{background:var(--surface2);border:1px solid var(--border2);color:var(--amber-dark);border-radius:9px;padding:7px 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Tajawal',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-mgr:hover{background:rgba(217,119,6,.08);}
.btn-new{background:linear-gradient(135deg,var(--amber-dark),var(--amber));color:#fff;border:none;border-radius:9px;padding:7px 16px;cursor:pointer;font-weight:900;font-size:13px;font-family:'Tajawal',sans-serif;box-shadow:0 3px 12px rgba(217,119,6,.25);transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-new:hover{box-shadow:0 5px 18px rgba(217,119,6,.4);transform:translateY(-1px);}
.btn-new:active{transform:scale(.96);}

/* ── LAYOUT ── */
main{display:flex;gap:18px;max-width:1320px;margin:0 auto;padding:18px 14px;position:relative;z-index:1;}

/* ── MENU ── */
.menu-sec{flex:1;min-width:0;}
.cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.cbt{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:6px 15px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Tajawal',sans-serif;transition:all .2s;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.cbt.active{background:linear-gradient(135deg,var(--amber-dark),var(--amber));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(217,119,6,.28);}
.cbt:hover:not(.active){border-color:var(--border2);color:var(--amber-dark);background:var(--surface3);}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:13px;}
.no-items{grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);font-size:15px;line-height:2.2;}
.icard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .25s;position:relative;box-shadow:0 1px 5px rgba(0,0,0,.05);}
.icard:hover{border-color:rgba(217,119,6,.3);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.09);}
.icard.in-order{border-color:rgba(217,119,6,.5);box-shadow:0 0 0 2px rgba(217,119,6,.1),0 6px 18px rgba(0,0,0,.07);}
.iimg{width:100%;height:115px;overflow:hidden;background:linear-gradient(135deg,var(--surface3),#e8e4dc);position:relative;}
.iimg img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.icard:hover .iimg img{transform:scale(1.05);}
.ino-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;opacity:.28;}
.ibadge{position:absolute;top:7px;right:7px;background:linear-gradient(135deg,var(--amber-dark),var(--amber));color:#fff;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:900;display:none;box-shadow:0 2px 7px rgba(0,0,0,.18);}
.icard.in-order .ibadge{display:block;animation:popIn .2s ease;}
@keyframes popIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.iinfo{padding:11px 11px 9px;}
.iname{font-size:13px;font-weight:700;margin-bottom:5px;line-height:1.3;color:var(--text);}
.iprice{font-size:14px;font-weight:900;color:var(--amber-dark);margin-bottom:9px;}
.ibtns{display:flex;gap:5px;}
.bminus{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.18);color:var(--red);border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:17px;font-weight:700;transition:all .15s;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.bminus:hover{background:rgba(220,38,38,.15);}
.icard.in-order .bminus{display:flex;}
.bplus{background:linear-gradient(135deg,var(--amber-dark),var(--amber));border:none;color:#fff;border-radius:7px;flex:1;height:30px;cursor:pointer;font-weight:900;font-size:15px;transition:all .15s;}
.bplus:hover{filter:brightness(1.07);}
.bplus:active{transform:scale(.95);}

/* ── ORDER PANEL (BIGGER) ── */
.opanel{width:380px;flex-shrink:0;}
.opsticky{position:sticky;top:78px;}
.ocard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 18px rgba(0,0,0,.07);}
.ohead{background:linear-gradient(135deg,var(--amber-dark),var(--amber));padding:13px 18px;display:flex;align-items:center;justify-content:space-between;}
.ohead-title{font-size:16px;font-weight:900;color:#fff;display:flex;align-items:center;gap:7px;}
.tbl-chip{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:800;display:none;}
.oscroll{padding:8px 14px;max-height:calc(100vh - 310px);min-height:140px;overflow-y:auto;}
.oscroll::-webkit-scrollbar{width:3px;}
.oscroll::-webkit-scrollbar-thumb{background:rgba(217,119,6,.2);border-radius:2px;}
.oempty{text-align:center;padding:30px 0;color:var(--muted);font-size:13px;line-height:2.2;}
.oempty .eico{font-size:36px;display:block;margin-bottom:8px;opacity:.4;}
.orow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05);animation:slideR .2s ease;}
@keyframes slideR{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:translateX(0);}}
.onum{background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.2);color:var(--amber-dark);border-radius:7px;padding:2px 7px;font-size:11px;font-weight:800;flex-shrink:0;}
.othumb{width:36px;height:36px;border-radius:8px;overflow:hidden;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;}
.othumb img{width:100%;height:100%;object-fit:cover;}
.oname{flex:1;font-size:13px;color:var(--text);font-weight:600;line-height:1.2;}
.oqty-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.oqbtn{background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.2);color:var(--amber-dark);border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.oqbtn:hover{background:rgba(217,119,6,.22);}
.oqnum{font-size:13px;font-weight:800;color:var(--text);min-width:18px;text-align:center;}
.oprice{color:var(--amber-dark);font-weight:800;font-size:13px;flex-shrink:0;min-width:64px;text-align:left;}
.odel{background:none;border:none;color:rgba(220,38,38,.4);cursor:pointer;font-size:17px;padding:0;line-height:1;flex-shrink:0;transition:color .15s;}
.odel:hover{color:var(--red);}
.ofooter{padding:11px 16px 15px;border-top:1px solid var(--border);}
.ototal-bar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;}
.otlbl{color:var(--muted);font-size:12px;margin-bottom:2px;}
.otcount{color:var(--muted);font-size:12px;}
.otval{font-size:24px;font-weight:900;color:var(--amber-dark);}
.iqd{font-size:12px;font-weight:700;color:var(--muted);margin-right:2px;}
.btn-invoice{width:100%;background:linear-gradient(135deg,#047857,var(--green));border:none;border-radius:11px;padding:12px;color:#fff;font-weight:900;font-size:15px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 13px rgba(5,150,105,.2);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-invoice:hover{box-shadow:0 6px 20px rgba(5,150,105,.34);transform:translateY(-1px);}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:500px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(18px);transition:transform .25s;box-shadow:0 20px 55px rgba(0,0,0,.13);}
.overlay.show .modal{transform:translateY(0);}
.mhead{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mtitle{font-size:16px;font-weight:900;color:var(--amber-dark);}
.mbclose{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mbclose:hover{color:var(--text);}
.mbody{flex:1;overflow-y:auto;padding:14px 18px;}
.mbody::-webkit-scrollbar{width:3px;}
.mbody::-webkit-scrollbar-thumb{background:var(--border);}
.fsec{background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:14px;}
.fstitle{font-size:12px;font-weight:800;color:var(--amber-dark);margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.frow{display:flex;gap:9px;margin-bottom:10px;}
.fg{flex:1;min-width:0;}
.fg.full{flex:none;width:100%;margin-bottom:10px;}
.flbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;}
.finp,.fsel{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Tajawal',sans-serif;font-weight:500;outline:none;transition:border-color .2s;}
.finp:focus,.fsel:focus{border-color:var(--border2);}
.finp::placeholder{color:var(--muted);}
.fsel option{background:var(--surface);color:var(--text);}
.iupload{width:100%;height:100px;background:var(--surface);border:2px dashed rgba(0,0,0,.13);border-radius:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .2s;position:relative;overflow:hidden;}
.iupload:hover{border-color:var(--border2);background:rgba(217,119,6,.03);}
.uico{font-size:26px;opacity:.32;}
.utxt{font-size:11px;color:var(--muted);}
.iupload .prev-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.uclr{position:absolute;top:5px;left:5px;background:rgba(220,38,38,.82);border:none;color:#fff;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:13px;align-items:center;justify-content:center;display:none;z-index:2;}
.iupload.has-img .uclr{display:flex;}
#dimg-inp{display:none;}
.cat-add-row{display:flex;gap:7px;margin-bottom:11px;}
.cinp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text);font-size:13px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .2s;}
.cinp:focus{border-color:var(--border2);}
.cinp::placeholder{color:var(--muted);}
.btn-addcat{background:linear-gradient(135deg,var(--amber-dark),var(--amber));color:#fff;border:none;border-radius:9px;padding:7px 14px;cursor:pointer;font-weight:800;font-size:13px;font-family:'Tajawal',sans-serif;white-space:nowrap;}
.clist{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.cchip{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 9px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.ccdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;line-height:1;transition:color .15s;}
.ccdel:hover{color:var(--red);}
.btn-adddish{width:100%;background:linear-gradient(135deg,var(--amber-dark),var(--amber));border:none;border-radius:11px;padding:11px;color:#fff;font-weight:900;font-size:14px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;margin-top:3px;}
.btn-adddish:hover{filter:brightness(1.05);transform:translateY(-1px);}
.dlist-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:10px;}
.dmrow{display:flex;align-items:center;gap:9px;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.dmimg{width:44px;height:44px;border-radius:9px;overflow:hidden;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.dmimg img{width:100%;height:100%;object-fit:cover;}
.dminfo{flex:1;min-width:0;}
.dmname{font-size:13px;font-weight:700;color:var(--text);}
.dmmeta{font-size:11px;color:var(--muted);margin-top:1px;}
.dmprice{font-size:13px;font-weight:800;color:var(--amber-dark);white-space:nowrap;}
.btn-dmdel{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.14);color:var(--red);border-radius:7px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-size:14px;}
.btn-dmdel:hover{background:rgba(220,38,38,.15);}

/* ── RECEIPT OVERLAY ── */
.roverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:600;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.roverlay.show{opacity:1;pointer-events:all;}
.rcard{background:#fff;border-radius:18px;width:100%;max-width:420px;overflow:hidden;transform:translateY(18px);transition:transform .25s;box-shadow:0 20px 55px rgba(0,0,0,.14);max-height:92vh;overflow-y:auto;direction:rtl;}
.roverlay.show .rcard{transform:translateY(0);}

/* receipt header */
.rhead{background:linear-gradient(135deg,#78350f,var(--amber-dark),var(--amber));padding:22px 20px 18px;text-align:center;position:relative;}
.rhead-wave{position:absolute;bottom:0;left:0;right:0;height:18px;background:var(--surface);clip-path:ellipse(54% 100% at 50% 100%);}
.rlogo{font-size:34px;margin-bottom:4px;}
.rrest{font-size:19px;font-weight:900;color:#fff;letter-spacing:.4px;}
.rtable-info{font-size:12px;color:rgba(255,255,255,.7);margin-top:4px;}
.rdate{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}

/* receipt body */
.rbody{padding:16px 20px 8px;}
.rtop-meta{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-radius:10px;padding:10px 14px;margin-bottom:14px;}
.rtm-item{text-align:center;}
.rtm-lbl{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:2px;}
.rtm-val{font-size:14px;font-weight:900;color:var(--text);}
.ritems-head{display:flex;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;padding:0 4px 7px;border-bottom:2px solid var(--surface3);}
.rih-num{width:26px;}
.rih-name{flex:1;}
.rih-qty{width:36px;text-align:center;}
.rih-price{width:70px;text-align:left;}
.ritem-row{display:flex;align-items:center;padding:8px 4px;border-bottom:1px dashed rgba(0,0,0,.07);}
.riseq{width:26px;font-size:11px;font-weight:800;color:var(--amber-dark);}
.riimg{width:30px;height:30px;border-radius:6px;overflow:hidden;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;margin-left:7px;}
.riimg img{width:100%;height:100%;object-fit:cover;}
.riname{flex:1;font-size:13px;font-weight:600;color:var(--text);}
.riuqty{width:36px;text-align:center;font-size:12px;color:var(--muted);}
.riprice{width:70px;text-align:left;font-size:13px;font-weight:800;color:var(--amber-dark);}
.rtotal-wrap{background:linear-gradient(135deg,rgba(180,83,9,.07),rgba(245,158,11,.06));border-radius:12px;padding:13px 16px;margin-top:13px;display:flex;justify-content:space-between;align-items:center;}
.rtlbl{font-size:15px;font-weight:800;color:var(--text);}
.rtval{font-size:22px;font-weight:900;color:var(--amber-dark);}
.rtiqd{font-size:12px;color:var(--muted);margin-right:3px;}
.rthanks{text-align:center;padding:12px;font-size:12px;color:var(--muted);}

/* receipt actions */
.ract{padding:0 16px 16px;display:flex;gap:9px;}
.btn-rprint{flex:1;background:linear-gradient(135deg,var(--amber-dark),var(--amber));border:none;border-radius:11px;padding:11px;font-weight:900;cursor:pointer;font-size:14px;font-family:'Tajawal',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-rnew{flex:1;background:linear-gradient(135deg,#047857,var(--green));border:none;border-radius:11px;padding:11px;font-weight:900;cursor:pointer;font-size:14px;font-family:'Tajawal',sans-serif;color:#fff;}
.btn-rclose{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px 14px;font-weight:700;cursor:pointer;font-size:13px;font-family:'Tajawal',sans-serif;color:var(--text);}

/* ── THERMAL PRINT ── */
#thermal-print-area {
  display: none;
  font-family: 'Courier New', Courier, monospace;
  width: 48mm;
  margin: 0;
  padding: 2mm 1mm;
  font-size: 8.5pt;
  font-weight: 900;
  color: #000;
  direction: rtl;
  background: #fff;
}
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; font-weight: 900 !important; }
  html, body { margin: 0 !important; padding: 0 !important; }
  body > * { display: none !important; }
  #thermal-print-area {
    display: block !important;
    width: 48mm !important;
    margin: 0 !important;
    padding: 2mm 0 2mm 1mm !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    font-weight: 900 !important;
  }
  #thermal-print-area * { font-weight: 900 !important; }
  @page { size: 50mm auto; margin: 0 0 0 0; }
}
.tp-center    { text-align: center; margin-bottom: 2mm; }
.tp-rname     { font-size: 11pt; font-weight: 900; margin-bottom: 1.5mm; }
.tp-meta      { font-size: 8pt;  font-weight: 900; margin-bottom: 1mm; }
.tp-divider   { border: none; border-top: 1px dashed #000; margin: 2mm 0; }
.tp-divider2  { border: none; border-top: 2px solid  #000; margin: 2mm 0; }

/* table layout — أضمن طريقة للطابعات الحرارية */
.tp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 8.5pt;
  font-weight: 900;
}
.tp-table th {
  font-weight: 900;
  font-size: 8pt;
  border-bottom: 1px solid #000;
  padding: 1mm 0.5mm;
  text-align: right;
}
.tp-table td {
  font-weight: 900;
  padding: 1.5mm 0.5mm;
  text-align: right;
  vertical-align: top;
  word-break: break-word;
}
.tp-table .col-qty   { text-align: center; width: 8mm; }
.tp-table .col-price { text-align: left;   width: 15mm; white-space: nowrap; }
.tp-table .col-name  { width: auto; }

.tp-total-row  { display: flex; justify-content: space-between; font-weight: 900; font-size: 10pt;  margin-top: 1.5mm; }
.tp-sub-row    { display: flex; justify-content: space-between; font-weight: 900; font-size: 7.5pt; margin-top: 1mm; }
.tp-footer-line{ text-align: center; font-size: 8pt; font-weight: 900; margin-top: 2mm; line-height: 1.7; }

/* ── PRINT PREVIEW MODAL ── */
.prev-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;
  z-index:800;padding:16px;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.prev-overlay.show{opacity:1;pointer-events:all;}
.prev-modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;width:100%;max-width:540px;
  max-height:92vh;overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(20px);transition:transform 0.25s;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.prev-overlay.show .prev-modal{transform:translateY(0);}
.prev-head{
  padding:16px 20px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;
}
.prev-title{font-size:16px;font-weight:900;color:var(--text);}
.prev-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.prev-close{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);border-radius:8px;width:30px;height:30px;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.prev-close:hover{color:var(--text);}
.prev-body{
  flex:1;overflow-y:auto;padding:20px;
  background:#d0d0d0;
  display:flex;flex-direction:column;align-items:center;
}
.prev-body::-webkit-scrollbar{width:4px;}
.prev-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.2);border-radius:2px;}
.prev-paper-wrap{position:relative;width:454px;}
.prev-ruler{
  display:flex;justify-content:space-between;
  font-size:9px;color:#888;margin-bottom:4px;
  font-family:'Courier New',monospace;
  width:454px;
}
.prev-paper{
  width:454px; /* 120mm at 96dpi ≈ 454px */
  background:#fff;
  padding:14px 12px;
  direction:rtl;
  font-family:'Courier New',Courier,monospace;
  font-size:12px;
  color:#000;
  line-height:1.5;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);
  position:relative;
  border-top:3px solid #555;
}
.prev-paper-shadow{
  width:454px;height:10px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.12),transparent);
  margin-top:-2px;
}

/* paper content styles */
.pp-center{text-align:center;}
.pp-rname{font-size:14px;font-weight:bold;margin-bottom:4px;}
.pp-meta{font-size:10px;margin-bottom:2px;color:#333;}
.pp-divider{border:none;border-top:1px dashed #000;margin:6px 0;}
.pp-divider2{border:none;border-top:2px solid #000;margin:6px 0;}
.pp-row-head{display:flex;justify-content:space-between;font-weight:bold;font-size:10px;border-bottom:1px solid #000;padding-bottom:4px;margin-bottom:4px;}
.pp-row-head span:first-child{flex:1;}
.pp-row-head span:not(:first-child){min-width:50px;text-align:left;}
.pp-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
.pp-row span:first-child{flex:1;padding-left:4px;}
.pp-row span:not(:first-child){min-width:50px;text-align:left;}
.pp-total{display:flex;justify-content:space-between;font-weight:bold;font-size:13px;margin-top:4px;}
.pp-count{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-top:2px;}
.pp-thanks{text-align:center;font-size:10px;color:#444;margin-top:8px;}
.pp-stars{text-align:center;font-size:11px;letter-spacing:2px;margin-top:3px;}
.pp-feed{height:20px;}

.prev-footer{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;gap:10px;flex-shrink:0;
}
.btn-prev-cancel{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:11px 8px;color:var(--text);
  font-weight:700;cursor:pointer;font-size:13px;font-family:'Tajawal',sans-serif;
  transition:all 0.15s;
}
.btn-prev-cancel:hover{border-color:rgba(0,0,0,0.15);}
.btn-prev-browser{
  flex:1;background:linear-gradient(135deg,#374151,#6b7280);
  border:none;border-radius:12px;padding:11px 8px;
  color:#fff;font-weight:800;font-size:13px;font-family:'Tajawal',sans-serif;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.btn-prev-browser:hover{filter:brightness(1.1);}
.btn-prev-print{
  flex:2;background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  border:none;border-radius:12px;padding:11px 8px;
  color:#fff;font-weight:900;font-size:13px;font-family:'Tajawal',sans-serif;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 14px rgba(59,130,246,0.3);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-prev-print:hover{box-shadow:0 6px 20px rgba(59,130,246,0.45);transform:translateY(-1px);}
.btn-prev-print:active{transform:scale(0.97);}

/* printer settings */
.psettings{
  padding:12px 20px;border-top:1px solid var(--border);
  background:var(--surface2);
}
.psettings-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:10px;}
.psettings-row{display:flex;gap:10px;}
.psg{flex:1;min-width:0;}
.pslbl{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;}
.psinp{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;color:var(--text);
  font-size:12px;font-family:'Tajawal',sans-serif;outline:none;
  transition:border-color 0.2s;
}
.psinp:focus{border-color:var(--border2);}
.psinp::placeholder{color:var(--muted);}
.print-status{
  margin:8px 20px 0;padding:8px 12px;border-radius:8px;
  font-size:13px;font-weight:700;font-family:'Tajawal',sans-serif;
  display:none;
}
.print-status.ok{background:rgba(5,150,105,0.1);color:var(--green);border:1px solid rgba(5,150,105,0.2);}
.print-status.err{background:rgba(220,38,38,0.08);color:var(--red);border:1px solid rgba(220,38,38,0.15);}

/* ── NOTIF ── */
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-6px);background:linear-gradient(135deg,var(--amber-dark),var(--amber));color:#fff;padding:8px 20px;border-radius:50px;font-weight:800;font-size:13px;z-index:9999;box-shadow:0 4px 18px rgba(217,119,6,.28);opacity:0;transition:all .3s;pointer-events:none;font-family:'Tajawal',sans-serif;}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  main{flex-direction:column;}
  .opanel{width:100%;}
  .opsticky{position:static;}
  .oscroll{max-height:240px;}
}
@media(max-width:540px){
  .igrid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));}
  .hactions{flex-wrap:wrap;gap:7px;}
  #tbl-inp{width:95px;}
  .opanel{width:100%;}
}

</head>
<body>

<!-- HEADER -->

<!-- MAIN -->
<main>

  </div>
  <div class="opanel">

<!-- MANAGE MODAL -->
<div class="overlay" id="mgr-overlay" onclick="ovClick(event,'mgr-overlay')">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle">⚙️ إدارة القائمة</div>
      <button class="mbclose" onclick="closeManage()">×</button>
    </div>
    <div class="mbody">
      <div class="fsec">
        <div class="fstitle">📂 الأقسام</div>
        <div class="cat-add-row">
          <input class="cinp" id="new-cat" type="text" placeholder="اسم القسم الجديد" onkeydown="if(event.key==='Enter')addCat()">
          <button class="btn-addcat" onclick="addCat()">+ إضافة</button>

<!-- RECEIPT MODAL (عرض فقط - الطباعة من إصدار الفاتورة مباشرة) -->
<div class="roverlay" id="r-overlay" onclick="ovClick(event,'r-overlay')">
  <div class="rcard">
    <div class="rhead">
      <div class="rlogo">🍽️</div>
      <div class="rrest" id="r-rname"></div>
      <div class="rtable-info" id="r-tbl"></div>
      <div class="rdate" id="r-date"></div>

    </div>
    <div class="rbody">
      <div class="rtop-meta">
        <div class="rtm-item"><div class="rtm-lbl">رقم الطلب</div><div class="rtm-val" id="r-ordno">#1</div></div>
        <div class="rtm-item"><div class="rtm-lbl">عدد الأصناف</div><div class="rtm-val" id="r-count">0</div></div>
        <div class="rtm-item"><div class="rtm-lbl">الكاشير</div><div class="rtm-val">—</div></div>

<!-- THERMAL PRINT AREA 58mm -->
<div id="thermal-print-area"></div>

<!-- NOTIFICATION -->
<div class="notif" id="notif"></div>

<script>
// ── STATE ──
const STORAGE_KEY = 'rms_v2';
let state = {
  restName: 'مطعم الأصالة',
  categories: ['المقبلات','الأطباق الرئيسية','المشروبات','الحلويات'],
  dishes: [
    {id:1,name:'سلطة خضراء',price:3000,cat:'المقبلات',img:null},
    {id:2,name:'حمص بالطحينة',price:2500,cat:'المقبلات',img:null},
    {id:3,name:'مندي لحم',price:12000,cat:'الأطباق الرئيسية',img:null},
    {id:4,name:'كبسة دجاج',price:10000,cat:'الأطباق الرئيسية',img:null},
    {id:5,name:'مشاوي مشكلة',price:15000,cat:'الأطباق الرئيسية',img:null},
    {id:6,name:'عصير برتقال',price:2000,cat:'المشروبات',img:null},
    {id:7,name:'شاي كرك',price:1500,cat:'المشروبات',img:null},
    {id:8,name:'كنافة',price:4000,cat:'الحلويات',img:null},
  ],
  orders: [],
  tableNo: '',
  seqCounter: 1,
  nextId: 100,
  activeCat: 0,
  orderNumber: 1,
};
let pendingImg = null;

// ── PERSIST ──
function saveState(){
  try{
    const s = {...state};
    // Don't save base64 images in localStorage if too large — skip img in dishes for storage efficiency
    const slim = JSON.parse(JSON.stringify(s));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(slim));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const saved = JSON.parse(raw);
      state = {...state, ...saved};
    }
  }catch(e){}
}

// ── HELPERS ──
function fmtIQD(v){ return Number(v).toLocaleString('ar-IQ'); }
function getQty(id){ const o=state.orders.find(o=>o.id===id); return o?o.qty:0; }

// ── CATS BAR ──
function renderCatBar(){
  const bar = document.getElementById('cats-bar');
  bar.innerHTML = state.categories.map((c,i)=>
    `<button class="cbt ${i===state.activeCat?'active':''}" onclick="setCat(${i})">${c}</button>`
  ).join('');
}
function setCat(i){ state.activeCat=i; saveState(); renderCatBar(); renderGrid(); }

// ── ITEMS GRID ──
function renderGrid(){
  const grid = document.getElementById('items-grid');
  const cat = state.categories[state.activeCat];
  const list = state.dishes.filter(d=>d.cat===cat);
  if(!list.length){
    grid.innerHTML=`<div class="no-items">لا توجد أطباق في هذا القسم 🍽️<br><small>أضف أطباقاً من ⚙️ إدارة القائمة</small></div>`;
    return;
  }
  grid.innerHTML = list.map(d=>{
    const qty = getQty(d.id);
    const imgH = d.img?`<img src="${d.img}" alt="${d.name}">`:`<div class="ino-img">🍽️</div>`;
    return `
    <div class="icard ${qty>0?'in-order':''}" id="card-${d.id}">
      <div class="iimg">${imgH}<span class="ibadge" id="badge-${d.id}">${qty}</span></div>
      <div class="iinfo">
        <div class="iname">${d.name}</div>
        <div class="iprice">${fmtIQD(d.price)} <span style="font-size:10px;color:var(--muted)">د.ع</span></div>
        <div class="ibtns">
          <button class="bminus" onclick="chQty(${d.id},-1)">−</button>
          <button class="bplus" onclick="chQty(${d.id},1)">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function chQty(id, delta){
  const dish = state.dishes.find(d=>d.id===id);
  if(!dish) return;
  const ex = state.orders.find(o=>o.id===id);
  if(delta>0){
    if(ex){ ex.qty++; }
    else{ state.orders.push({id,name:dish.name,price:dish.price,img:dish.img,qty:1,seq:state.seqCounter++}); }
    notify('تمت إضافة '+dish.name);
  } else {
    if(!ex) return;
    ex.qty--;
    if(ex.qty<=0) state.orders = state.orders.filter(o=>o.id!==id);
  }
  updateCard(id);
  renderPanel();
  saveState();
}

function updateCard(id){
  const qty = getQty(id);
  const card = document.getElementById('card-'+id);
  if(!card) return;
  const badge = card.querySelector('.ibadge');
  if(qty>0){ card.classList.add('in-order'); if(badge) badge.textContent=qty; }
  else { card.classList.remove('in-order'); if(badge) badge.textContent=0; }
}

// ── ORDER PANEL ──
function renderPanel(){
  const scroll = document.getElementById('oscroll');
  const footer = document.getElementById('ofooter');
  const chip   = document.getElementById('tbl-chip');
  const tbl    = document.getElementById('tbl-inp').value.trim();
  state.tableNo = tbl;
  chip.textContent = tbl?'طاولة '+tbl:'';
  chip.style.display = tbl?'block':'none';
  if(!state.orders.length){
    scroll.innerHTML=`<div class="oempty"><span class="eico">🍽️</span>لا توجد طلبات حتى الآن</div>`;
    footer.style.display='none'; return;
  }
  footer.style.display='block';
  scroll.innerHTML = state.orders.map((o,i)=>{
    const th = o.img?`<div class="othumb"><img src="${o.img}"></div>`:`<div class="othumb">🍽️</div>`;
    return `
    <div class="orow">
      <span class="onum">#${i+1}</span>
      ${th}
      <span class="oname">${o.name}</span>
      <div class="oqty-wrap">
        <button class="oqbtn" onclick="chQty(${o.id},-1)">−</button>
        <span class="oqnum">${o.qty}</span>
        <button class="oqbtn" onclick="chQty(${o.id},1)">+</button>
      </div>
      <span class="oprice">${fmtIQD(o.price*o.qty)}</span>
      <button class="odel" onclick="delOrder(${o.id})">×</button>
    </div>`;
  }).join('');
  const total = state.orders.reduce((s,o)=>s+o.price*o.qty,0);
  const count = state.orders.reduce((s,o)=>s+o.qty,0);
  document.getElementById('otval').textContent = fmtIQD(total);
  document.getElementById('otcount').textContent = count+' صنف';
  saveState();
}

function delOrder(id){
  state.orders = state.orders.filter(o=>o.id!==id);
  updateCard(id);
  renderPanel();
  saveState();
}

// ── NEW ORDER ──
function confirmNewOrder(){
  if(state.orders.length>0 && !confirm('هل تريد بدء طلب جديد؟ سيتم مسح الطلب الحالي.')){return;}
  const prev=[...state.orders];
  state.orders=[]; state.seqCounter=1;
  document.getElementById('tbl-inp').value='';
  state.tableNo='';
  state.orderNumber++;
  prev.forEach(o=>updateCard(o.id));
  renderPanel();
  closeReceipt();
  saveState();
  notify('تم بدء طلب جديد ✓');
}

// ── NAME EDIT ──
function startEditName(){
  document.getElementById('rname-disp').style.display='none';
  document.getElementById('name-wrap').style.display='flex';
  const inp=document.getElementById('name-inp');
  inp.value=state.restName; inp.focus();
}
function saveName(){
  const val=document.getElementById('name-inp').value.trim();
  if(val){ state.restName=val; document.getElementById('rname-disp').textContent=val; }
  document.getElementById('rname-disp').style.display='';
  document.getElementById('name-wrap').style.display='none';
  saveState();
}

// ── MANAGE ──
function openManage(){ renderMCats(); renderMDishes(); populateCatSel(); document.getElementById('mgr-overlay').classList.add('show'); }
function closeManage(){ document.getElementById('mgr-overlay').classList.remove('show'); }
function renderMCats(){
  document.getElementById('clist').innerHTML = state.categories.map((c,i)=>`
    <div class="cchip">${c}<button class="ccdel" onclick="delCat(event,${i})">×</button></div>`).join('');
}
function addCat(){
  const inp=document.getElementById('new-cat');
  const name=inp.value.trim();
  if(!name){notify('أدخل اسم القسم');return;}
  if(state.categories.includes(name)){notify('هذا القسم موجود مسبقاً');return;}
  state.categories.push(name); inp.value='';
  renderMCats(); populateCatSel(); renderCatBar(); saveState();
  notify('تمت إضافة القسم ✓');
}
function delCat(e,i){
  e.stopPropagation();
  const cat=state.categories[i];
  if(state.dishes.some(d=>d.cat===cat)){notify('لا يمكن حذف قسم يحتوي على أطباق');return;}
  state.categories.splice(i,1);
  if(state.activeCat>=state.categories.length) state.activeCat=Math.max(0,state.categories.length-1);
  renderMCats(); populateCatSel(); renderCatBar(); renderGrid(); saveState();
  notify('تم حذف القسم');
}
function populateCatSel(){
  document.getElementById('d-cat').innerHTML=state.categories.map(c=>`<option value="${c}">${c}</option>`).join('');
}
function handleImg(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingImg=ev.target.result;
    const area=document.getElementById('iupload');
    const old=area.querySelector('.prev-img'); if(old) old.remove();
    const img=document.createElement('img'); img.src=pendingImg; img.className='prev-img';
    area.prepend(img); area.classList.add('has-img');
    area.querySelector('.uico').style.display='none';
    area.querySelector('.utxt').style.display='none';
  };
  reader.readAsDataURL(file);
}
function clearImg(e){
  if(e) e.stopPropagation();
  pendingImg=null;
  const area=document.getElementById('iupload');
  const old=area.querySelector('.prev-img'); if(old) old.remove();
  area.classList.remove('has-img');
  area.querySelector('.uico').style.display='';
  area.querySelector('.utxt').style.display='';
  document.getElementById('dimg-inp').value='';
}
function addDish(){
  const name=document.getElementById('d-name').value.trim();
  const price=parseInt(document.getElementById('d-price').value);
  const cat=document.getElementById('d-cat').value;
  if(!name){notify('أدخل اسم الطبق');return;}
  if(!price||price<=0){notify('أدخل سعراً صحيحاً');return;}
  if(!cat){notify('اختر القسم');return;}
  state.dishes.push({id:state.nextId++,name,price,cat,img:pendingImg});
  document.getElementById('d-name').value='';
  document.getElementById('d-price').value='';
  clearImg(null);
  renderMDishes(); renderCatBar(); renderGrid(); saveState();
  notify('تمت إضافة '+name+' ✓');
}
function renderMDishes(){
  const el=document.getElementById('dm-list');
  if(!state.dishes.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="dlist-title">📋 الأطباق الحالية (${state.dishes.length})</div>`
    +state.dishes.map(d=>{
      const imgH=d.img?`<div class="dmimg"><img src="${d.img}"></div>`:`<div class="dmimg">🍽️</div>`;
      return `<div class="dmrow">${imgH}<div class="dminfo"><div class="dmname">${d.name}</div><div class="dmmeta">${d.cat}</div></div><div class="dmprice">${fmtIQD(d.price)} د.ع</div><button class="btn-dmdel" onclick="delDish(${d.id})">🗑</button></div>`;
    }).join('');
}
function delDish(id){
  state.dishes=state.dishes.filter(d=>d.id!==id);
  state.orders=state.orders.filter(o=>o.id!==id);
  renderMDishes(); renderGrid(); renderPanel(); saveState();
  notify('تم حذف الطبق');
}

// ── RECEIPT (عرض فقط) ──
function showReceipt(){
  if(!state.orders.length){notify('لا توجد طلبات بعد');return;}
  document.getElementById('r-rname').textContent = state.restName;
  document.getElementById('r-tbl').textContent   = state.tableNo?'طاولة رقم: '+state.tableNo:'';
  document.getElementById('r-date').textContent  = new Date().toLocaleString('ar-IQ');
  document.getElementById('r-ordno').textContent = '#'+state.orderNumber;
  const total=state.orders.reduce((s,o)=>s+o.price*o.qty,0);
  const count=state.orders.reduce((s,o)=>s+o.qty,0);
  document.getElementById('r-total').textContent = fmtIQD(total);
  document.getElementById('r-count').textContent = count;
  document.getElementById('r-items').innerHTML = state.orders.map((o,i)=>{
    const imgH=o.img?`<div class="riimg"><img src="${o.img}"></div>`:`<div class="riimg">🍽️</div>`;
    return `<div class="ritem-row"><span class="riseq">#${i+1}</span>${imgH}<span class="riname">${o.name}</span><span class="riuqty">×${o.qty}</span><span class="riprice">${fmtIQD(o.price*o.qty)}</span></div>`;
  }).join('');
  document.getElementById('r-overlay').classList.add('show');
}
function closeReceipt(){ document.getElementById('r-overlay').classList.remove('show'); }

// ── DIRECT PRINT (50mm) ──
function buildThermalHTML() {
  const total = state.orders.reduce((s,o)=>s+o.price*o.qty, 0);
  const count = state.orders.reduce((s,o)=>s+o.qty, 0);
  const date  = new Date().toLocaleString('en-GB', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', hour12:false
  });
  const tbl = state.tableNo ? `<div class="tp-meta">Table: ${state.tableNo}</div>` : '';
  const enNum = v => Number(v).toLocaleString('en-US');

  let rows = '';
  state.orders.forEach(o => {
    const name = String(o.name || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    rows += `<tr>
      <td class="col-name">${name}</td>
      <td class="col-qty">${o.qty}</td>
      <td class="col-price">${enNum(o.price * o.qty)}</td>
    </tr>`;
  });

  return `
    <div class="tp-center">
      <div class="tp-rname">${state.restName}</div>
      ${tbl}
      <div class="tp-meta">${date}</div>
      <div class="tp-meta">Order #${state.orderNumber}</div>
    </div>
    <hr class="tp-divider2">
    <table class="tp-table">
      <thead>
        <tr>
          <th class="col-name">الاسم</th>
          <th class="col-qty">عدد</th>
          <th class="col-price">السعر</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <hr class="tp-divider">
    <div class="tp-total-row">
      <span>الاجمالي</span>
      <span>${enNum(total)} IQD</span>
    </div>
    <div class="tp-sub-row">
      <span>Items: ${count}</span>
    </div>
    <hr class="tp-divider2">
    <div class="tp-footer-line">شكراً لزيارتكم</div>
    <div class="tp-footer-line">يسعدنا خدمتكم دائماً</div>
    <div class="tp-footer-line">*** ${state.restName} ***</div>
    <div style="height:20mm"></div>
  `;
}

function directPrint(){
  if(!state.orders.length){notify('لا توجد طلبات بعد');return;}

  // inject content BEFORE print event fires — zero render delay
  const area = document.getElementById('thermal-print-area');
  area.innerHTML = buildThermalHTML();

  state.orderNumber++;
  saveState();

  // Use matchMedia beforeprint for immediate rendering guarantee
  if(window.matchMedia){
    const mq = window.matchMedia('print');
    const handler = ()=>{ mq.removeEventListener('change', handler); };
    mq.addEventListener('change', handler);
  }
  window.print();
}

// ── ENTER KEY → PRINT ──
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    directPrint();
  }
});

// ── UTILS ──
function ovClick(e,id){ if(e.target.id===id) document.getElementById(id).classList.remove('show'); }
let ntimer;
function notify(msg){
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(ntimer); ntimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ── INIT ──
loadState();
document.getElementById('rname-disp').textContent = state.restName;
if(state.tableNo) document.getElementById('tbl-inp').value = state.tableNo;
renderCatBar();
renderGrid();
renderPanel();
</script>
</body>
</html>
